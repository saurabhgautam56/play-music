<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saurabh Music Player 🎵</title>

    <link rel="stylesheet" href="style.css">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>

<div class="app">

    <!-- 🎵 PLAYER -->
    <div class="music-player">

        <img id="album-cover" src="assets/images/cover.jpg">

        <h2 id="song-title">No Song Selected</h2>
        <p id="song-artist">Unknown Artist</p>

        <audio id="audio-player"></audio>

        <div class="controls">
            <button id="repeat-button"><i class="fas fa-redo"></i></button>
            <button id="prev-button"><i class="fas fa-backward"></i></button>
            <button id="play-pause-button"><i class="fas fa-play"></i></button>
            <button id="next-button"><i class="fas fa-forward"></i></button>
            <button id="shuffle-button"><i class="fas fa-random"></i></button>
        </div>

        <input type="range" id="progress-bar" min="0" max="100" value="0">

        <div id="time-info">
            <span id="current-time">0:00</span>
            <span id="total-duration">0:00</span>
        </div>

        <div class="volume-control">
            <i class="fas fa-volume-down"></i>
            <input type="range" id="volume" min="0" max="1" step="0.01">
        </div>

    </div>

    <!-- 📜 PLAYLIST -->
    <div class="playlist">
        <h3>Playlist</h3>
        <input type="text" id="search" placeholder="Search...">
        <div class="song-container">
            <ul id="song-list"></ul>
        </div>
        <div id="empty-state">No songs found 🎵</div>
    </div>


</div>

<script src="script.js"></script>

<div class="mini-player">
  <button id="prev-button"><i class="fas fa-backward"></i></button>
  <button id="play-pause-button"><i class="fas fa-play"></i></button>
  <button id="next-button"><i class="fas fa-forward"></i></button>
  <button id="shuffle-button"><i class="fas fa-random"></i></button>
  <button id="repeat-button"><i class="fas fa-redo"></i></button>
</div>
</body>
</html>
